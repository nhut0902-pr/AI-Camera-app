name: Android CI Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Prepare Signing Keystore
        run: |
          if [ -z "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "No production keystore found in GitHub Secrets."
            echo "Generating a secure temporary self-signed keystore to complete signed release compilation..."
            keytool -genkey -v -keystore my-upload-key.jks \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "temporary_password" \
              -keypass "temporary_password" \
              -dname "CN=OfflineAICamera, OU=AIStudio, O=Google, L=Mountain View, S=California, C=US"
            
            echo "TEMP_STORE_PASSWORD=temporary_password" >> $GITHUB_ENV
            echo "TEMP_KEY_PASSWORD=temporary_password" >> $GITHUB_ENV
          else
            echo "Production keystore found in GitHub Secrets. Decoding..."
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks
            
            echo "TEMP_STORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "TEMP_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build & Sign Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ env.TEMP_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ env.TEMP_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: offline-ai-camera-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: offline-ai-camera-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14

