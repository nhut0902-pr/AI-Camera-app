name: Android CI Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Prepare Signing Keystore
        run: |
          echo "Preparing debug keystore..."
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, generating a fallback debug keystore..."
            keytool -genkey -v -keystore debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug, O=Android, C=US"
          fi

          echo "Generating a secure self-signed keystore for signing the release APK..."
          keytool -genkey -v -keystore my-upload-key.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "temporary_password" \
            -keypass "temporary_password" \
            -dname "CN=OfflineAICamera, OU=AIStudio, O=Google, L=Mountain View, S=California, C=US"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build & Sign Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: temporary_password
          KEY_PASSWORD: temporary_password
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: offline-ai-camera-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: offline-ai-camera-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14

